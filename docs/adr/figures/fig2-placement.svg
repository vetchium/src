<svg width="680" height="330" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-g" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#43a047"/>
    </marker>
    <marker id="arr-r" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#e53935"/>
    </marker>
    <marker id="arr-dark" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="680" height="330" fill="#f8f9fa" rx="8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="340" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#1a1a1a">Figure 2 — Cross-Region Write: The Placement Dilemma</text>
  <text x="340" y="34" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Example: Hub user (ind1) applies to a job opening owned by an org (usa1)</text>

  <!-- User box (ind1) -->
  <rect x="20" y="110" width="140" height="60" rx="5" fill="#fff8e1" stroke="#f9a825" stroke-width="1.5"/>
  <text x="90" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#e65100">Hub User</text>
  <text x="90" y="153" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">home: ind1</text>

  <!-- Application (question) -->
  <rect x="255" y="110" width="170" height="60" rx="5" fill="#f3f3f3" stroke="#9e9e9e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="340" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#424242">Application Record</text>
  <text x="340" y="153" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#757575">where to write?</text>

  <!-- Job Opening box (usa1) -->
  <rect x="520" y="110" width="140" height="60" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="1.5"/>
  <text x="590" y="136" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#2e7d32">Job Opening</text>
  <text x="590" y="153" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">home: usa1</text>

  <!-- Arrow from user to application -->
  <line x1="160" y1="140" x2="255" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr-dark)"/>
  <text x="207" y="133" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">submits</text>

  <!-- Arrow from application to opening -->
  <line x1="425" y1="140" x2="520" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr-dark)"/>
  <text x="472" y="133" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">for opening in</text>

  <!-- Option A: write to usa1 DB (CHOSEN) -->
  <rect x="440" y="238" width="222" height="62" rx="5" fill="#e8f5e9" stroke="#43a047" stroke-width="2"/>
  <text x="551" y="261" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#2e7d32">✓  Write to usa1 DB</text>
  <text x="551" y="278" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">org reads locally — chosen (Option A)</text>
  <path d="M 340 170 C 340 205, 490 205, 490 238" stroke="#43a047" stroke-width="1.5" fill="none" marker-end="url(#arr-g)"/>
  <text x="460" y="200" font-family="sans-serif" font-size="9" fill="#43a047" font-weight="600">Option A</text>

  <!-- Option B: write to ind1 DB -->
  <rect x="18" y="238" width="222" height="62" rx="5" fill="#ffebee" stroke="#e53935" stroke-width="1.5"/>
  <text x="129" y="261" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#b71c1c">✗  Write to ind1 DB</text>
  <text x="129" y="278" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">org always reads cross-region (rejected)</text>
  <path d="M 340 170 C 340 205, 190 205, 190 238" stroke="#e53935" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="218" y="200" font-family="sans-serif" font-size="9" fill="#e53935">Option B</text>

  <!-- Option C: write to Global DB -->
  <rect x="230" y="238" width="185" height="62" rx="5" fill="#fff3e0" stroke="#fb8c00" stroke-width="1.5"/>
  <text x="322" y="261" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#e65100">✗  Write to Global DB</text>
  <text x="322" y="278" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">PII residency violation (rejected)</text>
  <path d="M 340 170 L 340 238" stroke="#fb8c00" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>
  <text x="350" y="210" font-family="sans-serif" font-size="9" fill="#fb8c00">Option C</text>

  <!-- note at bottom -->
  <text x="340" y="318" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#757575">No placement eliminates cross-region access. The decision is which direction is acceptable and how often it occurs.</text>
</svg>
