<svg width="660" height="400" viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-seq" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#333"/>
    </marker>
    <marker id="arr-loop" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L7,3.5 z" fill="#e53935"/>
    </marker>
  </defs>

  <rect width="660" height="400" fill="#f8f9fa" rx="8" stroke="#e0e0e0" stroke-width="1"/>
  <text x="330" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#1a1a1a">Figure 3 — Option E: The Infinite Proxy Loop</text>

  <!-- Swimlane headers -->
  <rect x="10" y="30" width="100" height="30" rx="3" fill="#e8eaf6" stroke="#9e9e9e" stroke-width="1"/>
  <text x="60" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#333">Browser</text>

  <rect x="120" y="30" width="100" height="30" rx="3" fill="#e8eaf6" stroke="#9e9e9e" stroke-width="1"/>
  <text x="170" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#333">nginx</text>

  <rect x="230" y="30" width="130" height="30" rx="3" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="295" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#880e4f">usa1 API Server</text>

  <rect x="370" y="30" width="130" height="30" rx="3" fill="#fff8e1" stroke="#f9a825" stroke-width="1"/>
  <text x="435" y="50" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#e65100">ind1 API Server</text>

  <!-- Swimlane vertical lines -->
  <line x1="60" y1="60" x2="60" y2="370" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="170" y1="60" x2="170" y2="370" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="295" y1="60" x2="295" y2="370" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="435" y1="60" x2="435" y2="370" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Step 1: Browser → nginx -->
  <line x1="60" y1="90" x2="162" y2="90" stroke="#333" stroke-width="1.2" marker-end="url(#arr-seq)"/>
  <text x="111" y="83" text-anchor="middle" font-family="monospace" font-size="9" fill="#333">GET /hub/get-profile</text>
  <text x="111" y="101" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#555">Bearer ind1_abc…</text>

  <!-- Step 2: nginx → usa1 (round-robin) -->
  <line x1="170" y1="118" x2="287" y2="118" stroke="#333" stroke-width="1.2" marker-end="url(#arr-seq)"/>
  <text x="228" y="111" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">round-robin → usa1</text>

  <!-- Step 3: usa1 auth proxies to ind1 -->
  <line x1="295" y1="150" x2="427" y2="150" stroke="#333" stroke-width="1.2" marker-end="url(#arr-seq)"/>
  <text x="361" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#880e4f">prefix = ind1_ ≠ home</text>
  <text x="361" y="155" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#880e4f">proxy to ind1  ①</text>

  <!-- Step 4: ind1 executes, then proxies to usa1 for data -->
  <line x1="435" y1="195" x2="303" y2="195" stroke="#333" stroke-width="1.2" marker-end="url(#arr-seq)"/>
  <text x="369" y="183" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e65100">auth OK — GetProfile runs</text>
  <text x="369" y="198" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e65100">target user in usa1 → proxy  ②</text>

  <!-- Step 5: usa1 auth sees ind1_ again, proxies back -->
  <line x1="295" y1="238" x2="427" y2="238" stroke="#e53935" stroke-width="1.5" marker-end="url(#arr-loop)"/>
  <text x="361" y="228" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e53935">prefix = ind1_ ≠ home</text>
  <text x="361" y="244" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e53935">proxy to ind1 again  ③ → ①</text>

  <!-- Loop arrow -->
  <path d="M 435 260 C 548 260, 548 188, 435 188" stroke="#e53935" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-loop)"/>
  <text x="570" y="228" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#e53935">∞</text>

  <!-- Root cause box -->
  <rect x="15" y="290" width="630" height="72" rx="5" fill="#fff9c4" stroke="#f9a825" stroke-width="1"/>
  <text x="330" y="310" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#333">Root cause: the same Bearer token serves two conflicting purposes.</text>
  <text x="330" y="327" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">① Auth middleware: "token prefix ≠ this region → proxy to home region" (session routing).</text>
  <text x="330" y="344" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">② GetProfile handler: "target user in usa1 → proxy to usa1" (data fetch) — using the same token.</text>
  <text x="330" y="363" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#757575">Option A removes step ② entirely: GetProfile queries usa1's DB directly. No proxy. No loop.</text>
</svg>
