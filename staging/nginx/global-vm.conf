events {
    worker_connections 2048;
}

# ── Staging "global VM" front door ────────────────────────────────────────────
# Mirrors the global VM in production: this is the only box that talks to the
# global-service (admin + cross-region identity/routing). In prod this nginx
# lives on the global VM and terminates TLS via ACME; on staging TLS is done by
# the Cloudflare tunnel in front, so we listen plain :80.
# CORS handling intentionally identical to nginx/api-lb.conf (dev) so behaviour
# matches: preflight answered here, actual-response ACAO set by the Go service.
http {
    client_max_body_size 10m;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        listen [::]:80;

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Request-ID, Accept, Origin';
                add_header 'Access-Control-Max-Age' '86400';
                return 204;
            }

            set $global_backend http://global-service:8081;
            proxy_pass $global_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
