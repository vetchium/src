# Production static-serving config for the Vetchium SPA images (hub/org/admin-ui).
# Replaces the dev `bun serve.ts` runtime: nginx serves the prebuilt dist/ with
# gzip + long-lived caching for hashed assets, and an SPA fallback to index.html.
# /config.json is generated at container start from $API_URL (see ui-entrypoint.sh)
# and must never be cached so the same image can target any environment.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # Runtime config — never cache.
    location = /config.json {
        add_header Cache-Control "no-store" always;
    }

    # Vite emits content-hashed filenames (e.g. index-2rzq5twk.js) at the root, so
    # cache static assets by extension — the hash makes them safe to keep forever.
    location ~* \.(?:js|mjs|css|svg|woff2?|ttf|eot|png|jpe?g|gif|webp|avif|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML / SPA routes — must revalidate so new deploys (new asset hashes) load.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
