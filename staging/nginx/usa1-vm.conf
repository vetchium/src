events {
    worker_connections 2048;
}

# ── Staging "usa1 regional VM" front door ──────────────────────────────────────
# Mirrors a regional VM in production: serves hub/org traffic for users whose
# session token routes here. Per ADR-001 the Go server reaches the correct
# regional DB by token prefix, so this single upstream can serve any user; in
# prod GeoDNS sends the *nearest* users here for latency. TLS is terminated by
# the Cloudflare tunnel in front on staging (ACME on the real VM in prod).
# CORS behaviour kept identical to nginx/api-lb.conf (dev).
http {
    client_max_body_size 10m;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        listen [::]:80;

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Request-ID, Accept, Origin';
                add_header 'Access-Control-Max-Age' '86400';
                return 204;
            }

            set $regional_backend http://regional-api-server-usa1:8080;
            proxy_pass $regional_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
