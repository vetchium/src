events {
    worker_connections 2048;
}

http {
    # Allow uploads up to 10MB so the application layer can enforce its own limits
    client_max_body_size 10m;

    # Timeouts for better stability under load
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Use Docker's embedded DNS so upstream hostnames are re-resolved dynamically
    # instead of being cached for the lifetime of the nginx process.
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    # Regional API servers (hub, org, global routes)
    upstream regional_servers {
        server regional-api-server-ind1:8080;
        server regional-api-server-usa1:8080;
        server regional-api-server-deu1:8080;
        keepalive 32;
    }

    server {
        listen 80;

        # Admin routes go to the global service.
        # Use a variable for proxy_pass so the resolver directive above takes effect
        # and nginx re-resolves global-service on each upstream failure / TTL expiry
        # rather than holding a stale IP from container startup.
        location /admin/ {
            # Handle CORS preflight at the proxy layer so it always succeeds
            # even when the upstream is slow to start or returns an error response.
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Request-ID, Accept, Origin';
                add_header 'Access-Control-Max-Age' '86400';
                return 204;
            }

            set $global_backend http://global-service:8081;
            proxy_pass $global_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # All other routes go to regional servers (round-robin for dev)
        location / {
            # Handle CORS preflight at the proxy layer so it always succeeds
            # even when the upstream is slow to start or returns an error response.
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Request-ID, Accept, Origin';
                add_header 'Access-Control-Max-Age' '86400';
                return 204;
            }

            proxy_pass http://regional_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint for the load balancer itself
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
